<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي | KuroNeko</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>body{font-family:'Tajawal',sans-serif;background:#0B0D10;color:#E7ECF0}</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <span class="font-bold text-xl text-teal-400">KuroNeko</span>
    </div>
    <div class="bg-[#12151A] border border-[#232830] rounded-2xl p-8 text-center">
      <div id="loading" class="text-sm text-gray-500">جاري التحميل...</div>
      <div id="content" class="hidden">
        <div class="w-16 h-16 rounded-full bg-teal-400/10 text-teal-400 flex items-center justify-center mx-auto mb-4 text-xl font-bold" id="avatar"></div>
        <h1 class="text-lg font-semibold" id="name"></h1>
        <p class="text-sm text-gray-500 mb-6" id="email"></p>
        <a href="/docs" class="block bg-[#0B0D10] border border-[#232830] rounded-xl py-2.5 text-sm mb-3 hover:border-teal-400/40 transition">توثيق الـ API</a>
        <button id="logoutBtn" class="w-full bg-red-500/10 text-red-400 border border-red-500/30 rounded-xl py-2.5 text-sm hover:bg-red-500/20 transition">تسجيل الخروج</button>
      </div>
    </div>
  </div>

  <script>
    fetch('/api/auth/me').then(r => r.json()).then(data => {
      document.getElementById('loading').classList.add('hidden');
      if (!data.status) {
        location.href = '/login?callbackUrl=/account';
        return;
      }
      document.getElementById('content').classList.remove('hidden');
      document.getElementById('name').textContent = data.user.name;
      document.getElementById('email').textContent = data.user.email;
      document.getElementById('avatar').textContent = (data.user.name || '?').slice(0, 2).toUpperCase();
    });

    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      location.href = '/login';
    });
  </script>
</body>
</html>
