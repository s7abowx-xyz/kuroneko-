<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نسيت كلمة المرور | KuroNeko</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Tajawal',sans-serif;background:#060708;color:#E7ECF0;}
  .card{background:#0D1013;border:1px solid #1C2128;}
  .field{background:#0A0C0E;border:1px solid #1C2128;}
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-[340px] card rounded-2xl p-6">
    <h1 class="text-base font-bold mb-1">نسيت كلمة المرور؟</h1>
    <p class="text-[11px] text-gray-500 mb-5">أدخل بريدك وسنرسل لك رابط إعادة التعيين.</p>
    <form id="form" class="flex flex-col gap-3">
      <div class="field rounded-lg flex items-center gap-2 px-3 py-2.5">
        <input type="email" id="email" required placeholder="البريد الإلكتروني" class="bg-transparent flex-1 text-xs outline-none placeholder:text-gray-600">
      </div>
      <p id="msg" class="text-xs hidden"></p>
      <button type="submit" class="bg-teal-400 text-[#060708] font-bold rounded-lg py-2.5 text-xs">إرسال رابط إعادة التعيين</button>
    </form>
    <div class="text-center text-[11px] text-gray-500 mt-4"><a href="/login" class="text-teal-400">العودة لتسجيل الدخول</a></div>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value }),
      });
      const data = await res.json();
      msg.textContent = data.message;
      msg.className = 'text-xs text-teal-400';
    });
  </script>
</body>
</html>
