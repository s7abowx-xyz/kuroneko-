<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المتجر | KuroNeko</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body { font-family:'Tajawal',sans-serif; background:radial-gradient(ellipse at top,#0d2b28 0%,#05100e 45%,#030807 100%); background-attachment:fixed; color:#E7ECF0; min-height:100vh; }
  .card { background: rgba(10,22,20,0.75); border:1px solid rgba(45,212,191,0.15); }
  .card-pro { border:1px solid rgba(45,212,191,0.5); box-shadow:0 0 30px rgba(45,212,191,0.1); }
</style>
</head>
<body class="px-5 py-8">
  <div class="max-w-md mx-auto">
    <div class="flex items-center gap-3 mb-6">
      <a href="/" class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-teal-300"><i class="fa-solid fa-arrow-right"></i></a>
      <h1 class="text-xl font-black text-teal-300">المتجر</h1>
    </div>

    <div id="loading" class="text-center text-sm text-gray-500 py-10">جاري التحميل...</div>
    <div id="content" class="hidden flex flex-col gap-4">

      <div id="currentPlanBadge" class="text-center text-xs text-gray-400 mb-1"></div>

      <div class="card rounded-xl p-5">
        <div class="text-sm font-bold mb-3">FREE</div>
        <ul class="text-xs text-gray-400 space-y-2 mb-4">
          <li><i class="fa-solid fa-check text-teal-400 ml-1"></i> كل نقاط الوصول الأساسية</li>
          <li><i class="fa-solid fa-check text-teal-400 ml-1"></i> حد طلبات عادي</li>
        </ul>
        <div class="text-center text-xs text-gray-500">خطتك الحالية إذا ما اشتركت</div>
      </div>

      <div class="card card-pro rounded-xl p-5 relative overflow-hidden">
        <span class="absolute top-3 left-3 bg-teal-400 text-[#05100e] text-[10px] font-bold px-2 py-0.5 rounded-full">Pro</span>
        <div class="text-sm font-bold mb-3">PRO</div>
        <ul class="text-xs text-gray-400 space-y-2 mb-4">
          <li><i class="fa-solid fa-check text-teal-400 ml-1"></i> حد طلبات أعلى</li>
          <li><i class="fa-solid fa-check text-teal-400 ml-1"></i> أولوية بالدعم الفني</li>
          <li><i class="fa-solid fa-check text-teal-400 ml-1"></i> دعم مباشر للمشروع</li>
        </ul>
        <button id="actionBtn" class="w-full bg-teal-400 text-[#05100e] font-bold rounded-xl py-2.5 text-sm hover:bg-teal-300 transition">اشترك الآن</button>
      </div>

      <p id="msg" class="text-center text-xs text-teal-300 hidden"></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    let userPlan = 'FREE';

    fetch('/api/auth/me').then(r => r.json()).then(data => {
      document.getElementById('loading').classList.add('hidden');
      if (!data.status) { location.href = '/login?callbackUrl=/store'; return; }
      document.getElementById('content').classList.remove('hidden');
      userPlan = data.user.plan;

      const badge = document.getElementById('currentPlanBadge');
      const btn = document.getElementById('actionBtn');
      if (userPlan === 'PRO') {
        badge.innerText = 'خطتك الحالية: Pro ✨';
        btn.innerText = 'إدارة الاشتراك';
      } else {
        badge.innerText = 'خطتك الحالية: Free';
      }

      if (params.get('success')) {
        document.getElementById('msg').innerText = 'تم الاشتراك بنجاح! قد يستغرق تفعيله لحظات.';
        document.getElementById('msg').classList.remove('hidden');
      }
      if (params.get('canceled')) {
        document.getElementById('msg').innerText = 'تم إلغاء عملية الدفع.';
        document.getElementById('msg').classList.remove('hidden');
      }
    });

    document.getElementById('actionBtn').addEventListener('click', async () => {
      const btn = document.getElementById('actionBtn');
      btn.disabled = true;
      btn.innerText = 'جاري التحويل...';
      const endpoint = userPlan === 'PRO' ? '/api/store/portal' : '/api/store/checkout';
      const res = await fetch(endpoint, { method: 'POST' });
      const data = await res.json();
      if (data.status && data.url) {
        location.href = data.url;
      } else {
        btn.disabled = false;
        btn.innerText = userPlan === 'PRO' ? 'إدارة الاشتراك' : 'اشترك الآن';
        document.getElementById('msg').innerText = data.message || 'حدث خطأ.';
        document.getElementById('msg').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
