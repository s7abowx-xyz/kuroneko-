<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | Alyacore</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body {
    font-family: 'Tajawal', sans-serif;
    background: radial-gradient(ellipse at top, #0d2b28 0%, #05100e 55%, #030807 100%);
    color: #E7ECF0;
    min-height: 100vh;
  }
  .card {
    background: rgba(10, 22, 20, 0.85);
    border: 1px solid rgba(45, 212, 191, 0.25);
    box-shadow: 0 0 40px rgba(45, 212, 191, 0.08), inset 0 0 60px rgba(45, 212, 191, 0.03);
    backdrop-filter: blur(6px);
  }
  .banner {
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .banner::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(5,16,14,1) 0%, rgba(5,16,14,0.1) 60%);
  }
  .field {
    background: rgba(5, 16, 14, 0.6);
    border: 1px solid rgba(45, 212, 191, 0.2);
  }
  .field:focus-within { border-color: #2dd4bf; }
</style>
</head>
<body class="flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-sm">
    <div class="card rounded-2xl overflow-hidden">
      <div class="banner h-32" style="background-image:url('/images/banner.jpg')"></div>

      <div class="p-6 -mt-2 relative">
        <h1 class="text-lg font-bold text-teal-300 mb-1">إنشاء حساب Alyacore</h1>
        <div class="h-0.5 w-10 bg-teal-400 rounded-full mb-4"></div>

        <form id="registerForm" class="flex flex-col gap-3">
          <div class="field rounded-xl flex items-center gap-2 px-3.5 py-2.5">
            <i class="fa-solid fa-id-badge text-teal-400/60 text-sm"></i>
            <input type="text" id="name" required placeholder="الاسم" class="bg-transparent flex-1 text-sm focus:outline-none placeholder:text-gray-500">
          </div>
          <div class="field rounded-xl flex items-center gap-2 px-3.5 py-2.5">
            <i class="fa-solid fa-user text-teal-400/60 text-sm"></i>
            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="bg-transparent flex-1 text-sm focus:outline-none placeholder:text-gray-500">
          </div>
          <div class="field rounded-xl flex items-center gap-2 px-3.5 py-2.5">
            <i class="fa-solid fa-key text-teal-400/60 text-sm"></i>
            <input type="password" id="password" required minlength="8" placeholder="كلمة المرور (8 أحرف على الأقل)" class="bg-transparent flex-1 text-sm focus:outline-none placeholder:text-gray-500">
          </div>

          <div class="cf-turnstile" data-sitekey="__TURNSTILE_SITE_KEY__" data-theme="dark"></div>

          <p id="msg" class="text-xs hidden"></p>

          <button type="submit" class="bg-teal-400 text-[#05100e] font-bold rounded-xl py-2.5 text-sm mt-1 hover:bg-teal-300 transition flex items-center justify-center gap-2">
            إنشاء الحساب <i class="fa-solid fa-arrow-left"></i>
          </button>
        </form>

        <div class="text-center text-xs text-gray-500 mt-5">
          لديك حساب بالفعل؟ <a href="/login" class="text-teal-400 hover:underline">تسجيل الدخول</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const turnstileToken = document.querySelector('[name="cf-turnstile-response"]')?.value;
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          'cf-turnstile-response': turnstileToken,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.message || 'حدث خطأ.';
        msg.className = 'text-xs text-red-400';
        return;
      }
      location.href = '/';
    });
  </script>
</body>
</html>
