<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور | Alyacore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Tajawal',sans-serif;background:#060708;color:#E7ECF0;}
  .card{background:#0D1013;border:1px solid #1C2128;}
  .field{background:#0A0C0E;border:1px solid #1C2128;}
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-[340px] card rounded-2xl p-6">
    <h1 class="text-base font-bold mb-4">إعادة تعيين كلمة المرور</h1>
    <form id="form" class="flex flex-col gap-3">
      <div class="field rounded-lg flex items-center gap-2 px-3 py-2.5">
        <input type="password" id="password" required minlength="8" placeholder="كلمة المرور الجديدة" class="bg-transparent flex-1 text-xs outline-none placeholder:text-gray-600">
      </div>
      <p id="msg" class="text-xs hidden"></p>
      <button type="submit" class="bg-teal-400 text-[#060708] font-bold rounded-lg py-2.5 text-xs">تحديث كلمة المرور</button>
    </form>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: document.getElementById('password').value }),
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.message; msg.className = 'text-xs text-red-400'; return;
      }
      location.href = '/login';
    });
  </script>
</body>
</html>
