<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | KuroNeko</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>body{font-family:'Tajawal',sans-serif;background:#0B0D10;color:#E7ECF0}</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <span class="font-bold text-xl text-teal-400">KuroNeko</span>
    </div>
    <div class="bg-[#12151A] border border-[#232830] rounded-2xl p-8">
      <h1 class="text-lg font-semibold mb-6 text-center">تسجيل الدخول</h1>

      <div class="flex flex-col gap-3 mb-6">
        <a href="/api/auth/github" class="flex items-center justify-center gap-2 border border-[#232830] rounded-xl py-2.5 text-sm hover:border-teal-400/40 transition">
          <i class="fa-brands fa-github"></i> المتابعة عبر GitHub
        </a>
        <a href="/api/auth/google" class="flex items-center justify-center gap-2 border border-[#232830] rounded-xl py-2.5 text-sm hover:border-teal-400/40 transition">
          <i class="fa-brands fa-google"></i> المتابعة عبر Google
        </a>
      </div>

      <div class="flex items-center gap-3 mb-6">
        <div class="h-px flex-1 bg-[#232830]"></div>
        <span class="text-xs text-gray-500">أو عبر البريد</span>
        <div class="h-px flex-1 bg-[#232830]"></div>
      </div>

      <form id="loginForm" class="flex flex-col gap-4">
        <input type="email" id="email" required placeholder="البريد الإلكتروني" class="bg-[#0B0D10] border border-[#232830] rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-teal-400">
        <input type="password" id="password" required placeholder="كلمة المرور" class="bg-[#0B0D10] border border-[#232830] rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-teal-400">
        <p id="msg" class="text-sm hidden"></p>
        <button type="submit" class="bg-teal-400 text-[#0B0D10] font-medium rounded-xl py-2.5 text-sm hover:bg-teal-300 transition">تسجيل الدخول</button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        ليس لديك حساب؟ <a href="/register" class="text-teal-400 hover:underline">إنشاء حساب</a>
      </p>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    const params = new URLSearchParams(location.search);
    const callbackUrl = params.get('callbackUrl') || '/account';
    const errMap = {
      oauth_state: 'فشل التحقق الأمني، حاول مرة أخرى.',
      no_email: 'لم نتمكن من الحصول على بريدك الإلكتروني من مزود الدخول.',
      oauth_failed: 'فشل تسجيل الدخول، حاول مرة أخرى.',
    };
    const err = params.get('error');
    if (err && errMap[err]) {
      const msg = document.getElementById('msg');
      msg.textContent = errMap[err];
      msg.className = 'text-sm text-red-400';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.message || 'حدث خطأ.';
        msg.className = 'text-sm text-red-400';
        return;
      }
      location.href = callbackUrl;
    });
  </script>
</body>
</html>
